<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業マッチング | 慶應就活ナビ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1a3e; --crimson: #c0001a; --gold: #c9a84c;
    --gold-light: #e8c96c; --cream: #faf7f2; --text: #1a1a1a;
    --text-muted: #6b6b6b; --green: #00703c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #0d1f4a; font-family: 'Noto Sans JP', sans-serif; display: flex; flex-direction: column; }

  nav {
    flex-shrink: 0; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.2rem;
    background: rgba(10,26,62,0.97);
    border-bottom: 1px solid rgba(201,168,76,0.12);
  }
  .nav-back { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s; }
  .nav-back:hover { color: var(--gold); }
  .nav-title { font-family: 'Noto Serif JP', serif; font-size: 0.88rem; color: var(--gold-light); font-weight: 700; }
  .like-pill {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.72rem; color: var(--gold); font-weight: 700;
    background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
    padding: 0.25rem 0.8rem; cursor: pointer; transition: all 0.2s;
  }
  .like-pill:hover { background: rgba(201,168,76,0.2); }

  .main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 1rem;
    background: linear-gradient(160deg, #0d1f4a 0%, #0a1a3e 60%, #111c3e 100%);
    overflow: hidden;
  }

  /* Progress */
  .progress-wrap { width: 100%; max-width: 380px; margin-bottom: 1rem; }
  .progress-bg { height: 2px; background: rgba(255,255,255,0.07); border-radius: 1px; }
  .progress-fill { height: 2px; background: var(--gold); border-radius: 1px; transition: width 0.4s ease; }
  .progress-label { font-size: 0.62rem; color: rgba(255,255,255,0.2); text-align: right; margin-top: 0.4rem; letter-spacing: 0.06em; }

  /* Stack */
  .card-wrap { width: 100%; max-width: 380px; }
  .card-stack { position: relative; height: 450px; }

  .company-card {
    position: absolute; inset: 0; border-radius: 16px;
    overflow: hidden; cursor: grab; user-select: none;
    will-change: transform; display: flex; flex-direction: column;
    background: var(--cream);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
  }
  .company-card:active { cursor: grabbing; }
  .company-card.animating { transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.35s ease; }
  .company-card.returning { transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .company-card[data-layer="1"] { z-index: 3; }
  .company-card[data-layer="2"] { z-index: 2; transform: scale(0.96) translateY(10px); filter: brightness(0.82); transition: transform 0.3s ease, filter 0.3s ease; }
  .company-card[data-layer="3"] { z-index: 1; transform: scale(0.92) translateY(20px); filter: brightness(0.65); transition: transform 0.3s ease, filter 0.3s ease; }

  /* Card Header */
  .card-header { padding: 1.8rem 1.5rem 1.4rem; position: relative; overflow: hidden; flex-shrink: 0; min-height: 135px; display: flex; flex-direction: column; justify-content: flex-end; }
  .card-header-bg { position: absolute; inset: 0; }
  .card-header-noise { position: absolute; inset: 0; opacity: 0.03; background-image: repeating-linear-gradient(45deg, white 0, white 1px, transparent 0, transparent 50%); background-size: 10px 10px; }
  .card-header-gold { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--gold); }
  .card-industry { position: relative; z-index: 1; font-size: 0.58rem; color: var(--gold); font-weight: 700; letter-spacing: 0.2em; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }
  .card-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .card-name { position: relative; z-index: 1; font-family: 'Noto Serif JP', serif; font-size: 1.55rem; color: white; font-weight: 700; line-height: 1.2; }

  /* Card Body */
  .card-body { padding: 1.1rem 1.5rem; flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 0.9rem; }
  .card-fl { }
  .card-fl-label { font-size: 0.57rem; color: var(--crimson); font-weight: 700; letter-spacing: 0.18em; margin-bottom: 0.3rem; }
  .card-fl-text { font-size: 0.79rem; color: var(--text); line-height: 1.75; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .card-footer { padding: 0.7rem 1.5rem 1rem; display: flex; gap: 0.4rem; flex-wrap: wrap; flex-shrink: 0; border-top: 1px solid rgba(10,26,62,0.06); }
  .chip { font-size: 0.6rem; padding: 0.18rem 0.6rem; background: rgba(10,26,62,0.06); color: var(--navy); border-radius: 20px; font-weight: 600; }
  .chip-link { font-size: 0.6rem; padding: 0.18rem 0.6rem; background: rgba(192,0,26,0.06); color: var(--crimson); border-radius: 20px; font-weight: 600; text-decoration: none; transition: background 0.2s; }
  .chip-link:hover { background: rgba(192,0,26,0.12); }

  /* Stamps */
  .stamp { position: absolute; z-index: 10; pointer-events: none; font-size: 1rem; font-weight: 900; letter-spacing: 0.12em; padding: 0.35rem 0.9rem; border: 3px solid; border-radius: 4px; opacity: 0; transition: opacity 0.05s; }
  .stamp-like { top: 1.2rem; left: 1.2rem; color: var(--green); border-color: var(--green); transform: rotate(-12deg); }
  .stamp-skip { top: 1.2rem; right: 1.2rem; color: var(--crimson); border-color: var(--crimson); transform: rotate(12deg); }

  /* Actions */
  .actions { width: 100%; max-width: 380px; display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding: 1.1rem 0 0.6rem; }
  .abtn { border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0; }
  .abtn:active { transform: scale(0.9) !important; }
  .abtn-skip { width: 56px; height: 56px; font-size: 1.25rem; background: rgba(255,255,255,0.12); box-shadow: 0 4px 20px rgba(0,0,0,0.3); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.25); }
  .abtn-skip:hover { transform: scale(1.06); color: var(--crimson); background: rgba(192,0,26,0.15); box-shadow: 0 6px 24px rgba(192,0,26,0.25); border-color: var(--crimson); }
  .abtn-like { width: 68px; height: 68px; font-size: 1.55rem; color: white; background: linear-gradient(135deg, #00703c, #009450); box-shadow: 0 8px 30px rgba(0,112,60,0.4); }
  .abtn-like:hover { transform: scale(1.08); box-shadow: 0 12px 36px rgba(0,112,60,0.5); }
  .abtn-detail { width: 52px; height: 52px; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.04em; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.9); box-shadow: 0 4px 16px rgba(0,0,0,0.2); font-family: 'Noto Sans JP', sans-serif; }
  .abtn-detail:hover { transform: scale(1.06); background: rgba(201,168,76,0.2); color: var(--gold); border-color: var(--gold); }

  .swipe-hint { font-size: 0.6rem; color: rgba(255,255,255,0.16); text-align: center; letter-spacing: 0.08em; }

  /* Feedback pop */
  .feedback { position: fixed; top: 45%; left: 50%; transform: translate(-50%,-50%) scale(0); font-size: 4rem; pointer-events: none; z-index: 999; }
  .feedback.pop { animation: fbpop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes fbpop { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 60%{transform:translate(-50%,-50%) scale(1.2);opacity:1} 100%{transform:translate(-50%,-50%) scale(1);opacity:0} }

  /* Empty */
  .empty { display:none; text-align:center; padding:2rem; max-width:360px; width:100%; }
  .empty-icon { font-size:3rem; margin-bottom:1rem; }
  .empty-title { font-family:'Noto Serif JP',serif; font-size:1.2rem; color:white; font-weight:700; margin-bottom:0.7rem; }
  .empty-desc { font-size:0.8rem; color:rgba(255,255,255,0.35); line-height:1.9; margin-bottom:1.8rem; }
  .empty-btn { padding:0.75rem 2rem; background:var(--crimson); color:white; border:none; font-family:'Noto Sans JP',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; border-radius:4px; transition:background 0.2s; }
  .empty-btn:hover { background:#e8001f; }

  /* Loading */
  .loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; }
  .spinner { width:32px; height:32px; border:2px solid rgba(201,168,76,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-txt { font-size:0.75rem; color:rgba(255,255,255,0.25); }

  /* Modal */
  .overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.82); backdrop-filter:blur(6px); align-items:flex-end; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:var(--cream); width:100%; max-width:480px; max-height:78vh; border-radius:16px 16px 0 0; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 -20px 60px rgba(0,0,0,0.5); }
  .modal-handle { width:36px; height:4px; background:rgba(10,26,62,0.12); border-radius:2px; margin:0.8rem auto 0; flex-shrink:0; }
  .modal-head { background:var(--navy); padding:0.9rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .modal-head-title { font-family:'Noto Serif JP',serif; font-size:0.95rem; color:white; font-weight:700; }
  .modal-close-btn { background:none; border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.5); width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:0.85rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .modal-close-btn:hover { border-color:var(--crimson); color:var(--crimson); }
  .modal-scroll { overflow-y:auto; flex:1; padding:0.8rem; }
  .liked-empty-msg { text-align:center; padding:3rem 1rem; color:var(--text-muted); font-size:0.82rem; line-height:1.8; }
  .liked-row { display:flex; align-items:center; justify-content:space-between; gap:0.8rem; padding:0.9rem 1rem; background:white; border-radius:10px; margin-bottom:0.4rem; border-left:3px solid var(--green); }
  .liked-row-name { font-size:0.88rem; font-weight:700; color:var(--navy); margin-bottom:0.15rem; }
  .liked-row-ind { font-size:0.62rem; color:var(--gold); font-weight:700; letter-spacing:0.1em; }
  .liked-row-link { font-size:0.68rem; color:white; background:var(--navy); text-decoration:none; padding:0.3rem 0.75rem; border-radius:4px; white-space:nowrap; transition:background 0.2s; flex-shrink:0; }
  .liked-row-link:hover { background:var(--crimson); }
  .liked-row-nol { font-size:0.68rem; color:var(--text-muted); white-space:nowrap; flex-shrink:0; }
  .modal-clear-btn { width:100%; margin-top:0.4rem; padding:0.65rem; background:none; border:1px solid rgba(192,0,26,0.18); color:var(--crimson); font-family:'Noto Sans JP',sans-serif; font-size:0.72rem; cursor:pointer; border-radius:6px; transition:all 0.2s; }
  .modal-clear-btn:hover { background:rgba(192,0,26,0.05); }

  @media (max-width:400px) {
    .card-stack { height:420px; }
    .card-name { font-size:1.35rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="members.html" class="nav-back">← 会員ページ</a>
  <div class="nav-title">企業マッチング</div>
  <div class="like-pill" onclick="openModal()">♥ <span id="like-count">0</span></div>
</nav>

<div class="feedback" id="feedback"></div>

<div class="main" id="main">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-txt">読み込み中...</div>
  </div>

  <div id="card-ui" style="display:none;flex-direction:column;align-items:center;width:100%;">
    <div class="progress-wrap">
      <div class="progress-bg"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
      <div class="progress-label" id="plabel"></div>
    </div>
    <div class="card-wrap">
      <div class="card-stack" id="stack"></div>
    </div>
    <div class="actions">
      <button class="abtn abtn-skip" onclick="swipe('left')">✕</button>
      <button class="abtn abtn-like" onclick="swipe('right')">♥</button>
      <button class="abtn abtn-detail" onclick="openNote()">採用<br>ページ</button>
    </div>
    <div class="swipe-hint">← スキップ　　気になる →</div>
  </div>

  <div class="empty" id="empty">
    <div class="empty-icon">✓</div>
    <div class="empty-title">全部チェックしました！</div>
    <div class="empty-desc">気になる企業は♥ から確認できます。<br>企業ノートが増えるとまた楽しめます。</div>
    <button class="empty-btn" onclick="restart()">もう一度スワイプする</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-head-title">気になる企業 <span id="modal-cnt" style="color:var(--gold);margin-left:0.5rem;"></span></div>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-scroll" id="modal-body"></div>
  </div>
</div>

<script>
const COMPANY_CSV = 'https://docs.google.com/spreadsheets/d/1axjcyNPqBiD4SiNhxDx3NaVALelMEkMt2x2ng0Sk7Ww/export?format=csv&gid=0';
const LIKED_KEY = 'keio_navi_liked_v2';

let companies = [], idx = 0, sessionSeen = new Set();
let liked = JSON.parse(localStorage.getItem(LIKED_KEY) || '[]');
let dragging = false, sx = 0, sy = 0, cx = 0;
let topCard = null;

const IND_COLORS = {
  '総合商社':'#112b5c','商社':'#112b5c','コンサル':'#221048','コンサルティング':'#221048',
  '金融':'#0a2e21','メガバンク':'#0a2e21','銀行':'#0a2e21','証券':'#0a2e21',
  '広告':'#4a1218','マスコミ':'#3a1a10','IT':'#0a2248','ソフトウェア':'#0a2248',
  'SIer':'#0a2248','メーカー':'#0e2a10','不動産':'#2e2008','インフラ':'#1a1a2e',
};
function hdrColor(ind) {
  for (const [k,v] of Object.entries(IND_COLORS)) { if (ind && ind.includes(k)) return v; }
  return '#122050';
}

async function fetchCSV(url) {
  const res = await fetch(url, {redirect:'follow'});
  const text = await res.text();
  if (text.includes('<!DOCTYPE')) throw new Error();
  return text.trim().split('\n').map(line => {
    const r=[]; let cur='',inQ=false;
    for (let i=0;i<line.length;i++) {
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){r.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    r.push(cur.trim()); return r;
  }).slice(1);
}

async function init() {
  try {
    const rows = await fetchCSV(COMPANY_CSV);
    companies = rows.filter(r=>r[0]&&r[0].trim()).map(r=>({
      name:r[0]||'',industry:r[1]||'',business:r[2]||'',
      strength:r[3]||'',motive:r[4]||'',process:r[5]||'',url:r[6]||'',
    }));
    companies.sort(()=>Math.random()-0.5);
  } catch(e) { companies = sample(); }
  document.getElementById('loading').style.display='none';
  const ui=document.getElementById('card-ui'); ui.style.display='flex';
  updateCount(); render();
}

function getNext() {
  // 未表示の企業をフィルタ
  let pool = companies.filter(c => !sessionSeen.has(c.name));
  // 全部見たらセッションリセット（ただし直前の企業は除外）
  if (!pool.length) {
    const last = [...sessionSeen].slice(-1)[0];
    sessionSeen.clear();
    if (last) sessionSeen.add(last);
    pool = companies.filter(c => !sessionSeen.has(c.name));
  }
  // ランダムに1社選ぶ
  const pick = pool[Math.floor(Math.random() * pool.length)];
  sessionSeen.add(pick.name);
  return pick;
}

function render() {
  const stack = document.getElementById('stack');
  stack.innerHTML = '';
  if (!companies.length) { showEmpty(); return; }
  updateProg();
  // 上から3枚分のカードをプレビュー生成
  const preview = [];
  const tempSeen = new Set(sessionSeen);
  for (let i = 0; i < 3; i++) {
    let pool = companies.filter(c => !tempSeen.has(c.name));
    if (!pool.length) { tempSeen.clear(); pool = companies; }
    const pick = pool[Math.floor(Math.random() * pool.length)];
    tempSeen.add(pick.name); preview.push(pick);
  }
  preview.slice().reverse().forEach((c, ri) => {
    const layer = preview.length - ri;
    stack.appendChild(makeCard(c, layer));
  });
  topCard = stack.querySelector('[data-layer="1"]');
  if (topCard) attachDrag(topCard);
}

function makeCard(c, layer) {
  const card=document.createElement('div');
  card.className='company-card'; card.dataset.layer=layer; card.dataset.name=c.name;
  const bg=hdrColor(c.industry);
  const urls=(c.url||'').split(/[|;]/).map(u=>u.trim()).filter(u=>u.startsWith('http'));
  const firstUrl=urls[0]||'';
  const shortBiz = c.business ? (c.business.split(/[。\n]/)[0].slice(0,60) + (c.business.length>60?'…':'')) : '';
  const shortStr = c.strength ? (c.strength.split(/\n/)[0].replace(/【強み】/,'').slice(0,50) + '…') : '';
  card.innerHTML=`
    <div class="stamp stamp-like">LIKE</div>
    <div class="stamp stamp-skip">SKIP</div>
    <div class="card-header">
      <div class="card-header-bg" style="background:linear-gradient(135deg,#0a1a3e 0%,${bg} 100%)"></div>
      <div class="card-header-noise"></div>
      <div class="card-header-gold"></div>
      <div class="card-industry"><span class="card-dot"></span>${c.industry||'業界未設定'}</div>
      <div class="card-name">${c.name}</div>
    </div>
    <div class="card-body">
      ${c.business?`<div class="card-fl"><div class="card-fl-label">事業内容</div><div class="card-fl-text">${shortBiz}</div></div>`:''}
      ${c.strength?`<div class="card-fl"><div class="card-fl-label">強み</div><div class="card-fl-text">${shortStr}</div></div>`:''}
    </div>
    <div class="card-footer">
      ${c.industry?`<span class="chip">${c.industry}</span>`:''}
    </div>`;
  return card;
}

function attachDrag(card) {
  card.addEventListener('mousedown', down);
  card.addEventListener('touchstart', down, {passive:true});
}
function down(e) {
  dragging=true;
  const p=e.touches?e.touches[0]:e;
  sx=p.clientX; sy=p.clientY; cx=0;
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, {passive:true});
  document.addEventListener('mouseup', up);
  document.addEventListener('touchend', up);
}
function move(e) {
  if(!dragging||!topCard) return;
  const p=e.touches?e.touches[0]:e;
  cx=p.clientX-sx;
  const cy=(p.clientY-sy)*0.25;
  const rot=cx*0.06;
  topCard.style.transform=`translateX(${cx}px) translateY(${cy}px) rotate(${rot}deg)`;
  const like=topCard.querySelector('.stamp-like');
  const skip=topCard.querySelector('.stamp-skip');
  const t=50;
  if(cx>t){like.style.opacity=Math.min((cx-t)/80,1);skip.style.opacity=0;}
  else if(cx<-t){skip.style.opacity=Math.min((-cx-t)/80,1);like.style.opacity=0;}
  else{like.style.opacity=0;skip.style.opacity=0;}
}
function up() {
  if(!dragging) return; dragging=false;
  document.removeEventListener('mousemove',move); document.removeEventListener('touchmove',move);
  document.removeEventListener('mouseup',up); document.removeEventListener('touchend',up);
  if(cx>100) swipe('right');
  else if(cx<-100) swipe('left');
  else {
    if(topCard){
      topCard.classList.add('returning');
      topCard.style.transform='';
      topCard.querySelectorAll('.stamp').forEach(s=>s.style.opacity=0);
      setTimeout(()=>topCard&&topCard.classList.remove('returning'),400);
    }
  }
}

function swipe(dir) {
  if(!topCard) return;
  const name = topCard.dataset.name;
  const c = companies.find(x => x.name === name);
  if(!c) return;
  topCard.classList.add('animating');
  topCard.style.transform=`translateX(${dir==='right'?'130%':'-130%'}) rotate(${dir==='right'?'20deg':'-20deg'})`;
  topCard.style.opacity='0'; topCard.dataset.layer='0';
  if(dir==='right') {
    if(!liked.find(x=>x.name===c.name)){liked.push(c);localStorage.setItem(LIKED_KEY,JSON.stringify(liked));}
    pop('♥'); updateCount();
  } else { pop('✕'); }
  // 次のカードをスタックに追加（無限ループ）
  setTimeout(()=>{
    const stack=document.getElementById('stack');
    // 古いトップカードを削除
    const old = stack.querySelector('[data-layer="0"]');
    if(old) old.remove();
    // 残りのカードを繰り上げ
    stack.querySelectorAll('.company-card').forEach(card=>{
      const l = parseInt(card.dataset.layer);
      if(l>0) { card.dataset.layer = l-1; }
    });
    // 新しい3枚目を追加
    const next = getNext();
    const newCard = makeCard(next, 3);
    stack.insertBefore(newCard, stack.firstChild);
    // トップカードにドラッグ付与
    topCard = stack.querySelector('[data-layer="1"]');
    if(topCard) attachDrag(topCard);
    updateProg();
  }, 320);
}

function pop(emoji) {
  const el=document.getElementById('feedback');
  el.textContent=emoji; el.classList.remove('pop');
  void el.offsetWidth; el.classList.add('pop');
}

function updateProg() {
  const seen = sessionSeen.size;
  const total = companies.length;
  const pct = Math.min((seen / total) * 100, 100);
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('plabel').textContent = `今回 ${seen} / ${total} 社チェック済み`;
}
function updateCount() { document.getElementById('like-count').textContent=liked.length; }

function showEmpty() {
  // 企業が0社の場合のみ
  document.getElementById('card-ui').style.display='none';
  document.getElementById('empty').style.display='block';
}
function restart() {
  sessionSeen.clear(); idx=0;
  document.getElementById('empty').style.display='none';
  document.getElementById('card-ui').style.display='flex';
  render();
}
function openNote() {
  const c=companies[idx]; if(!c) return;
  const urls=(c.url||'').split(/[|;]/).map(u=>u.trim()).filter(u=>u.startsWith('http'));
  window.open(urls[0]||'members.html','_blank');
}

function openModal() {
  document.getElementById('modal-cnt').textContent=liked.length+'社';
  const body=document.getElementById('modal-body');
  if(!liked.length){body.innerHTML='<div class="liked-empty-msg">まだ気になる企業がありません。<br>右にスワイプして選んでみましょう。</div>';}
  else{body.innerHTML=liked.map(c=>{
    const urls=(c.url||'').split(/[|;]/).map(u=>u.trim()).filter(u=>u.startsWith('http'));
    const u=urls[0]||'';
    return `<div class="liked-row">
      <div><div class="liked-row-name">${c.name}</div><div class="liked-row-ind">${c.industry||''}</div></div>
      ${u?`<a href="${u}" target="_blank" class="liked-row-link">採用ページ</a>`:`<span class="liked-row-nol">URL未登録</span>`}
    </div>`;
  }).join('')+`<button class="modal-clear-btn" onclick="clearLiked()">リストをリセット</button>`;}
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; }
function overlayClick(e){ if(e.target===document.getElementById('overlay')) closeModal(); }
function clearLiked(){
  if(!confirm('リストをリセットしますか？')) return;
  liked=[]; localStorage.setItem(LIKED_KEY,JSON.stringify(liked));
  updateCount(); closeModal();
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') swipe('right');
  if(e.key==='ArrowLeft') swipe('left');
  if(e.key==='Escape') closeModal();
});
